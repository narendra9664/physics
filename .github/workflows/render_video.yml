name: Render Physics Reel

on:
  push:
    paths:
      - 'episodes/**/scene.py'
      - 'src/**'
      - '.github/workflows/**'
  # Scheduled run: 3 times a day with 6-hour delays (6:00 AM, 12:00 PM, 6:00 PM UTC)
  schedule:
    - cron: '0 6,12,18 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      topic:
        description: 'Physics Topic (e.g. Gravity / spacetime curvature)'
        required: false
        type: string
      slug:
        description: 'Episode slug folder name (optional)'
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libpango1.0-dev libcairo2-dev libpng-dev libjpeg-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Physics Reel Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PYTHONIOENCODING: utf-8
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.topic }}" ]; then
          # Manual trigger with specific topic
          python src/run_pipeline.py --topic "${{ github.event.inputs.topic }}" --slug "${{ github.event.inputs.slug }}"
        elif [ "${{ github.event_name }}" = "push" ]; then
          # Push trigger: find modified episode slug folder name
          SLUG=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null | grep '^episodes/' | head -n 1 | cut -d/ -f2)
          if [ -n "$SLUG" ] && [ "$SLUG" != "001-gravity-spacetime" ]; then
            # If a new episode scene was pushed, render that specifically
            # Find the topic title from its script.json or default to slug
            TOPIC=$(python -c "import json; p='episodes/$SLUG/script.json'; print(json.load(open(p, encoding='utf-8')).get('topic', '$SLUG') if open(p).read() else '$SLUG')" 2>/dev/null || echo "$SLUG")
            python src/run_pipeline.py --topic "$TOPIC" --slug "$SLUG"
          else
            # Default fallback push
            python src/run_pipeline.py --topic "Gravity / spacetime curvature" --slug "001-gravity-spacetime"
          fi
        else
          # Scheduled trigger: runs automatically on the next queued backlog topic
          python src/run_pipeline.py
        fi
      shell: bash

    - name: Upload Artifacts (if compiled)
      uses: actions/upload-artifact@v4
      with:
        name: rendered-reels
        path: outputs/final/*.mp4
        if-no-files-found: ignore
        retention-days: 7
